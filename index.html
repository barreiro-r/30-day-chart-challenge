<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>30 Day Chart Challenge 2026</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration (matching your Vite setup) -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            hanken: ['"Hanken Grotesk"', 'sans-serif'],
            caslon: ['"Libre Caslon Text"', 'serif'],
            'caslon-display': ['"Libre Caslon Display"', 'serif'],
          },
        },
      },
    }
  </script>

  <!-- Global Styles & Google Fonts -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300..900;1,300..900&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&display=swap');
    
    body { margin: 0; }
    
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="h-screen overflow-hidden bg-[#d0ccc5] text-[#38352f] font-hanken flex flex-col selection:bg-[#b83326] selection:text-[#f0ebe3]">
  
  <!-- The Root Container for our Vanilla JS App -->
  <div id="root" class="h-full flex flex-col w-full"></div>

  <!-- Vanilla JavaScript Application Logic -->
  <script>
    const themes = ["Comparisons", "Distributions", "Relationships", "Timeseries", "Uncertainties"];
    const topics = [
      "Part-to-Whole", "Pictogram", "Mosaic", "Slope", "Experimental", "Reporters Without Borders Data Day",
      "Multiscale", "Circular", "Wealth", "Pop Culture", "Physical", "FlowingData Theme Day",
      "Ecosystems", "Trade", "Correlation", "Causation", "Remake", "UNICEF Data Day",
      "Evolution", "Global Change", "Historical", "New Tool", "Seasons", "South China Morning Post Theme Day",
      "Space", "Trend", "Animation", "Modeling", "Monochrome", "Global Health Data Exchange Data Day"
    ];

    // Generate mock data exactly like the React version
    const chartData = Array.from({ length: 30 }, (_, i) => {
      const day = i + 1;
      const week = Math.floor(i / 6) + 1;
      const paddedDay = String(day).padStart(2, '0');
      
     // Define the extension based on the day
    const fileExtension = day === 27 ? 'gif' : 'png';
    
    return {
      id: day,
      day: day,
      week: week,
      theme: themes[week - 1],
      topic: topics[i],
      githubUrl: `https://github.com/barreiro-r/30-day-chart-challenge/blob/main/2026/scripts/day${paddedDay}.qmd`,
      imageUrl: `https://raw.githubusercontent.com/barreiro-r/30-day-chart-challenge/main/2026/images/day${paddedDay}.${fileExtension}`
    };
    });

    // State Management
    let currentView = 'home';
    const failedImages = new Set();

    // State Mutators
    function setView(view) {
      currentView = view;
      render();
    }

    function handleImageError(imgElement, id) {
      failedImages.add(id);
      render(); // Re-render to show text fallback
    }

    // Main Render Function
    function render() {
      const root = document.getElementById('root');

      // 1. Render Header
      const headerHTML = `
        <header class="bg-[#d0ccc5] relative z-10 px-6 py-4 md:py-6 flex flex-col items-center justify-center text-center border-b border-[#38352f]/10 shrink-0 font-caslon gap-3 md:gap-5 w-full transition-all duration-300">
          <button onclick="setView('home')" class="flex flex-col items-center text-center shrink-0 group cursor-pointer bg-transparent border-none p-0">
            <span class="font-caslon-display text-[#b83326] group-hover:opacity-80 transition-all duration-300 whitespace-nowrap ${currentView === 'home' ? 'text-2xl md:text-4xl tracking-tight' : 'text-sm md:text-base'}">
              #30DayChartChallenge2026
            </span>
            ${currentView === 'home' ? `
            <span class="text-xs md:text-sm lowercase text-[#38352f]/70 mt-1 md:mt-2 group-hover:text-[#b83326] transition-colors">
              rodrigo barreiro
            </span>` : ''}
          </button>
          
          <nav class="flex justify-start sm:justify-center gap-x-4 md:gap-x-6 text-[10px] md:text-xs lowercase whitespace-nowrap overflow-x-auto w-full hide-scrollbar shrink-0 pb-1 md:pb-0">
            ${themes.map((theme, index) => {
              const week = index + 1;
              const activeClass = currentView === week ? 'text-[#b83326] border-b border-[#b83326]' : 'text-[#38352f]/70';
              return `<button onclick="setView(${week})" class="hover:text-[#b83326] transition-colors cursor-pointer bg-transparent border-none p-0 ${activeClass}">${theme}</button>`;
            }).join('')}
          </nav>
        </header>
      `;

      // 2. Render Main Content (Grid vs Carousel)
      let mainHTML = '';

      if (currentView === 'home') {
        mainHTML = `
          <main class="flex-grow flex flex-col w-full overflow-hidden min-h-0">
            <div class="flex-grow flex items-center justify-center min-h-0 w-full h-full px-6 py-6">
              <div class="grid grid-cols-6 grid-rows-5 gap-1 sm:gap-2 h-full max-h-full max-w-full aspect-[21/25] mx-auto">
                ${chartData.map(chart => `
                  <div onclick="setView(${chart.week})" class="cursor-pointer group h-full w-full relative overflow-hidden bg-[#f0ebe3] flex flex-col items-center justify-center text-center p-2 opacity-90 hover:opacity-100 transition-opacity">
                    ${chart.imageUrl && !failedImages.has(chart.id) ? `
                      <img src="${chart.imageUrl}" alt="Day ${chart.day}: ${chart.topic}" class="w-full h-full object-cover absolute inset-0" onerror="handleImageError(this, ${chart.id})">
                    ` : `
                      <div class="font-caslon text-[#38352f] text-[1.2vw] sm:text-[1vw] md:text-[0.75vw] leading-tight lowercase">
                        <p>week ${chart.week}: ${chart.theme}</p>
                        <p>day ${String(chart.day).padStart(2, '0')}, ${chart.topic}</p>
                      </div>
                    `}
                  </div>
                `).join('')}
              </div>
            </div>
          </main>
        `;
      } else {
        const weekCharts = chartData.filter(c => c.week === currentView);
        mainHTML = `
          <main class="flex-grow flex flex-col w-full overflow-hidden min-h-0">
            <div class="flex-grow flex flex-col relative w-full h-full min-h-0 justify-center">
              <div class="flex overflow-x-auto overflow-y-hidden snap-x snap-mandatory gap-16 md:gap-32 hide-scrollbar items-end h-full w-full pb-8 pt-20 md:pb-12 md:pt-24" style="scrollbar-width: none; -ms-overflow-style: none;">
                ${weekCharts.map((chart, index) => {
                  const ml = index === 0 ? 'ml-6 md:ml-12' : '';
                  const mr = index === weekCharts.length - 1 ? 'mr-6 md:mr-12' : '';
                  
                  return `
                    <div class="flex flex-col snap-center shrink-0 w-[82vw] h-auto md:w-max md:h-full max-h-full relative justify-end ${ml} ${mr}">
                      
                      <div class="w-full flex justify-between items-end gap-4 mb-4 md:mb-5 md:absolute md:bottom-full md:left-0 shrink-0">
                        <div class="text-[13px] md:text-[14px] leading-snug text-[#38352f] font-caslon lowercase flex flex-col gap-1 min-w-0 text-left">
                          <span class="opacity-80 truncate">week ${chart.week}: ${chart.theme}</span>
                          <span class="truncate">day ${String(chart.day).padStart(2, '0')}, ${chart.topic}</span>
                        </div>
                        <a href="${chart.githubUrl}" target="_blank" rel="noopener noreferrer" class="text-[12px] md:text-[13px] font-caslon lowercase text-[#38352f]/60 hover:text-[#b83326] transition-colors pb-0.5 shrink-0 text-right">code ↗</a>
                      </div>

                      <div class="w-full h-auto max-h-full md:h-full md:w-full bg-[#f0ebe3] relative flex items-center justify-center shrink min-h-0 md:shrink-0 md:min-w-[300px]">
                        ${chart.imageUrl && !failedImages.has(chart.id) ? `
                          <img src="${chart.imageUrl}" alt="Day ${chart.day}: ${chart.topic}" class="w-full h-auto max-h-full md:h-full md:w-auto object-contain block shrink min-h-0" onerror="handleImageError(this, ${chart.id})">
                        ` : `
                          <div class="w-full aspect-[3.5/5] md:h-full md:w-auto md:aspect-[3.5/5] flex flex-col items-center justify-center p-6 text-center shrink min-h-0">
                            <div class="font-caslon text-[#38352f] text-base sm:text-lg md:text-xl leading-relaxed lowercase">
                              <p>week ${chart.week}: ${chart.theme}</p>
                              <p>day ${String(chart.day).padStart(2, '0')}, ${chart.topic}</p>
                            </div>
                          </div>
                        `}
                      </div>

                    </div>
                  `;
                }).join('')}
              </div>
            </div>
          </main>
        `;
      }

      // 3. Render Footer
      const footerHTML = `
        <footer class="bg-[#d0ccc5] relative z-10 px-6 py-4 flex flex-col sm:flex-row justify-between items-center sm:items-baseline border-t border-[#38352f]/10 shrink-0 font-caslon text-xs md:text-[13px] text-[#38352f]/70 w-full gap-3 lowercase">
          <div class="flex flex-wrap justify-center sm:justify-start gap-4 sm:gap-6 items-center">
            <span class="text-[#38352f]">rodrigo barreiro</span>
            <a href="https://github.com/barreiro-r/30-day-chart-challenge" target="_blank" rel="noopener noreferrer" class="hover:text-[#b83326] transition-colors">github</a>
            <a href="https://www.linkedin.com/in/rodrigoasbarreiro/" target="_blank" rel="noopener noreferrer" class="hover:text-[#b83326] transition-colors">linkedin</a>
            <a href="https://bsky.app/profile/rodrigo404.bsky.social" target="_blank" rel="noopener noreferrer" class="hover:text-[#b83326] transition-colors">bluesky</a>
          </div>
          <a href="https://github.com/30DayChartChallenge/Edition2026" target="_blank" rel="noopener noreferrer" class="hover:text-[#b83326] transition-colors">original challenge ↗</a>
        </footer>
      `;

      // Apply to DOM
      root.innerHTML = headerHTML + mainHTML + footerHTML;
    }

    // Trigger Initial Render
    render();
  </script>
</body>
</html>
